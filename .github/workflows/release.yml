name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
          - goos: windows
            goarch: arm64
            archive_ext: zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Show build context
        shell: bash
        run: |
          set -euo pipefail
          echo "ref=${GITHUB_REF_NAME}"
          echo "runner=$(uname -a)"
          go version
          go env GOOS GOARCH CGO_ENABLED GOPATH GOMODCACHE GOCACHE

      - name: Build archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          dist="dist"
          binary="codegraph"
          binary_name="${binary}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            binary_name="${binary}.exe"
          fi
          archive_base="${binary}_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${dist}/${archive_base}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 go build -v -x -o "${dist}/${archive_base}/${binary_name}" ./cmd/codegraph
          cp README.md "${dist}/${archive_base}/README.md"
          cp LICENSE "${dist}/${archive_base}/LICENSE"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            (
              cd "${dist}/${archive_base}"
              zip -q -r "../${archive_base}.zip" .
            )
            sha256sum "${dist}/${archive_base}.zip" > "${dist}/${archive_base}.zip.sha256"
          else
            tar -C "${dist}" -czf "${dist}/${archive_base}.tar.gz" "${archive_base}"
            sha256sum "${dist}/${archive_base}.tar.gz" > "${dist}/${archive_base}.tar.gz.sha256"
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
