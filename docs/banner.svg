<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <radialGradient id="bg" cx="40%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050c18"/>
    </radialGradient>
    <radialGradient id="glow-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow-node">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#00ff8844"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="70" x2="900" y2="70"/>
    <line x1="0" y1="140" x2="900" y2="140"/>
    <line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="700" y1="0" x2="700" y2="280"/>
  </g>

  <!-- Glow blobs -->
  <ellipse cx="760" cy="140" rx="200" ry="160" fill="url(#glow-green)" filter="url(#blur-lg)"/>
  <ellipse cx="120" cy="100" rx="120" ry="100" fill="url(#glow-blue)" filter="url(#blur-lg)"/>

  <!-- ═══ GRAPH VISUALIZATION (right side) ═══ -->
  <!-- Edges -->
  <g stroke="#00ff8833" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <!-- Hub node to outer nodes -->
    <line x1="760" y1="140" x2="700" y2="80"/>
    <line x1="760" y1="140" x2="820" y2="85"/>
    <line x1="760" y1="140" x2="830" y2="170"/>
    <line x1="760" y1="140" x2="790" y2="215"/>
    <line x1="760" y1="140" x2="700" y2="200"/>
    <line x1="760" y1="140" x2="690" y2="145"/>
    <!-- Outer connections -->
    <line x1="700" y1="80" x2="820" y2="85" stroke="#00d4ff33"/>
    <line x1="820" y1="85" x2="830" y2="170" stroke="#00d4ff22"/>
    <line x1="790" y1="215" x2="700" y2="200" stroke="#00d4ff22"/>
    <line x1="690" y1="145" x2="700" y2="80" stroke="#00d4ff22"/>
    <line x1="690" y1="145" x2="700" y2="200" stroke="#00d4ff22"/>
    <!-- Extended nodes -->
    <line x1="820" y1="85" x2="865" y2="55"/>
    <line x1="830" y1="170" x2="870" y2="185"/>
    <line x1="700" y1="80" x2="660" y2="55"/>
    <line x1="700" y1="200" x2="655" y2="225"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow-node)">
    <!-- Hub node (central, biggest) -->
    <circle cx="760" cy="140" r="11" fill="#00ff88" opacity="0.9"/>
    <circle cx="760" cy="140" r="16" fill="#00ff88" opacity="0.15"/>

    <!-- Primary nodes -->
    <circle cx="700" cy="80"  r="7" fill="#00d4ff" opacity="0.85"/>
    <circle cx="820" cy="85"  r="7" fill="#00d4ff" opacity="0.85"/>
    <circle cx="830" cy="170" r="7" fill="#00d4ff" opacity="0.85"/>
    <circle cx="790" cy="215" r="6" fill="#00d4ff" opacity="0.7"/>
    <circle cx="700" cy="200" r="6" fill="#00d4ff" opacity="0.7"/>
    <circle cx="690" cy="145" r="7" fill="#00d4ff" opacity="0.85"/>

    <!-- Leaf nodes -->
    <circle cx="865" cy="55"  r="4" fill="#00ff8866"/>
    <circle cx="870" cy="185" r="4" fill="#00ff8866"/>
    <circle cx="660" cy="55"  r="4" fill="#00ff8866"/>
    <circle cx="655" cy="225" r="4" fill="#00ff8866"/>

    <!-- Distant scattered nodes -->
    <circle cx="615" cy="110" r="3" fill="#ffffff22"/>
    <circle cx="625" cy="175" r="3" fill="#ffffff22"/>
    <circle cx="860" cy="120" r="3" fill="#ffffff22"/>
    <circle cx="850" cy="230" r="3" fill="#ffffff22"/>
  </g>

  <!-- Small faint node labels -->
  <g fill="#00ff8855" font-size="7" font-family="'Courier New', monospace">
    <text x="748" y="133">hub</text>
    <text x="686" y="73">fn</text>
    <text x="825" y="78">pkg</text>
    <text x="836" y="168">call</text>
    <text x="674" y="141">mod</text>
    <text x="695" y="198">dep</text>
  </g>

  <!-- ═══ LEFT / CENTER TEXT CONTENT ═══ -->

  <!-- Top label -->
  <text x="48" y="62" font-size="11" letter-spacing="4" fill="#00ff8888" font-family="'Courier New', monospace" font-weight="bold">CODE CONTEXT ENGINE · MCP SERVER</text>

  <!-- Main wordmark -->
  <text x="44" y="135" font-size="68" font-weight="bold" fill="#ffffff" font-family="'Courier New', monospace" letter-spacing="-2">code</text>
  <text x="228" y="135" font-size="68" font-weight="bold" fill="#00ff88" font-family="'Courier New', monospace" letter-spacing="-2">graph</text>

  <!-- Tagline -->
  <text x="48" y="168" font-size="16" fill="#8899aa" font-family="'Courier New', monospace">Your codebase, understood. Locally.</text>

  <!-- Divider line -->
  <line x1="48" y1="188" x2="580" y2="188" stroke="#ffffff15" stroke-width="1"/>

  <!-- Stats row -->
  <g font-family="'Courier New', monospace" font-size="12.5">
    <!-- Stat 1 -->
    <text x="48" y="212" fill="#00ff88" font-weight="bold">29</text>
    <text x="68" y="212" fill="#556677"> MCP tools</text>
    <!-- Divider -->
    <text x="158" y="212" fill="#334455">·</text>
    <!-- Stat 2 -->
    <text x="172" y="212" fill="#00d4ff" font-weight="bold">12</text>
    <text x="193" y="212" fill="#556677"> languages</text>
    <!-- Divider -->
    <text x="292" y="212" fill="#334455">·</text>
    <!-- Stat 3 -->
    <text x="306" y="212" fill="#ffaa44" font-weight="bold">1</text>
    <text x="320" y="212" fill="#556677"> binary</text>
    <!-- Divider -->
    <text x="390" y="212" fill="#334455">·</text>
    <!-- Stat 4 -->
    <text x="404" y="212" fill="#ff6688" font-weight="bold">0</text>
    <text x="418" y="212" fill="#556677"> cloud deps</text>
  </g>

  <!-- Install command box -->
  <rect x="48" y="228" width="560" height="34" rx="6" fill="#ffffff08" stroke="#00ff8833" stroke-width="1"/>
  <text x="64" y="250" font-size="13" fill="#556677" font-family="'Courier New', monospace">$</text>
  <text x="80" y="250" font-size="13" fill="#00ff88cc" font-family="'Courier New', monospace">go install github.com/isink17/codegraph/cmd/codegraph@latest</text>

  <!-- Top-right badge: version -->
  <rect x="790" y="14" width="88" height="22" rx="4" fill="#00ff8820" stroke="#00ff8855" stroke-width="1"/>
  <text x="834" y="29" text-anchor="middle" font-size="11" fill="#00ff88" font-family="'Courier New', monospace">v1.1.0</text>

  <!-- Top-right badge: go -->
  <rect x="686" y="14" width="96" height="22" rx="4" fill="#00d4ff20" stroke="#00d4ff55" stroke-width="1"/>
  <text x="734" y="29" text-anchor="middle" font-size="11" fill="#00d4ff" font-family="'Courier New', monospace">Go 1.23+</text>
</svg>
